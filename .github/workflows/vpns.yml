name: VPN Tunnel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install V2Ray
      run: |
        curl -L https://github.com/v2fly/fhs-install-v2ray/raw/master/install-release.sh -o install-v2ray.sh
        chmod +x install-v2ray.sh
        sudo bash install-v2ray.sh
        sudo systemctl disable v2ray
        echo "✅ V2Ray installed"

    - name: Install cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        cloudflared --version

    - name: Setup V2Ray Config
      run: |
        sudo mkdir -p /usr/local/etc/v2ray
        sudo tee /usr/local/etc/v2ray/config.json > /dev/null << 'EOF'
        {
          "log": {
            "access": "/var/log/v2ray/access.log",
            "error": "/var/log/v2ray/error.log",
            "loglevel": "debug"
          },
          "inbounds": [{
            "port": 8080,
            "listen": "0.0.0.0",
            "protocol": "vmess",
            "settings": {
              "clients": [{
                "id": "eb705684-21e0-4422-9cbe-b0209b702961",
                "alterId": 0
              }]
            },
            "streamSettings": {
              "network": "ws",
              "wsSettings": {
                "path": "/ws",
                "headers": {
                  "Host": "localhost"
                }
              }
            }
          }],
          "outbounds": [{
            "protocol": "freedom",
            "settings": {}
          }]
        }
        EOF
        echo "✅ V2Ray config created"

    - name: Start VPN & Send to Telegram
      run: |
        echo "🚀 Starting V2Ray..."
        sudo v2ray run -config /usr/local/etc/v2ray/config.json > /tmp/v2ray.log 2>&1 &
        V2RAY_PID=$!
        sleep 5

        if ! kill -0 $V2RAY_PID 2>/dev/null; then
          echo "❌ V2Ray failed to start!"
          cat /tmp/v2ray.log
          exit 1
        fi
        echo "✅ V2Ray running (PID: $V2RAY_PID)"

        echo "🚀 Starting Cloudflare Tunnel..."
        cloudflared tunnel --url http://localhost:8080 > /tmp/tunnel.log 2>&1 &
        CF_PID=$!
        sleep 25

        if ! kill -0 $CF_PID 2>/dev/null; then
          echo "❌ Cloudflared failed to start!"
          cat /tmp/tunnel.log
          exit 1
        fi
        echo "✅ Cloudflared running (PID: $CF_PID)"

        # Extract tunnel URL
        TUNNEL_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)

        if [ -z "$TUNNEL_URL" ]; then
          echo "⚠️ Waiting more for tunnel URL..."
          sleep 10
          TUNNEL_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
        fi

        if [ -z "$TUNNEL_URL" ]; then
          echo "❌ Could not get tunnel URL!"
          cat /tmp/tunnel.log
          exit 1
        fi

        HOST=$(echo $TUNNEL_URL | sed 's|https://||')

        echo ""
        echo "========================================"
        echo "🎯 TUNNEL URL: $TUNNEL_URL"
        echo "========================================"

        # Send to Telegram using Secrets
        echo "📤 Sending to Telegram..."

        BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
        CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"

        # Build message with URL encoding
        MSG_TEXT="VPN Tunnel Started!%0A%0A🎯 Server: $HOST%0A🔗 URL: $TUNNEL_URL%0A%0A📱 NekoBox Settings:%0A• Type: VMess%0A• Server: $HOST%0A• Port: 443%0A• UUID: eb705684-21e0-4422-9cbe-b0209b702961%0A• Alter ID: 0%0A• Security: auto%0A• Network: ws%0A• Path: /ws%0A• TLS: ON%0A• Allow Insecure: ON%0A• WS Host: $HOST%0A• SNI: $HOST%0A%0A⏰ Auto-restart: Every 5 hours%0A⏳ Duration: 6 hours max"

        curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage"           -d "chat_id=$CHAT_ID"           -d "parse_mode=HTML"           -d "text=$MSG_TEXT"           > /tmp/telegram_response.json

        if [ $? -eq 0 ]; then
          echo "✅ Message sent to Telegram!"
          cat /tmp/telegram_response.json
        else
          echo "⚠️ Failed to send Telegram message"
          cat /tmp/telegram_response.json
        fi

        echo ""
        echo "========================================"
        echo "📱 NEKOBOX SETTINGS (COPY EXACTLY):"
        echo ""
        echo "Profile Name: GitHub-VPN"
        echo "Type: VMess"
        echo "Server: $HOST"
        echo "Port: 443"
        echo "UUID: eb705684-21e0-4422-9cbe-b0209b702961"
        echo "Alter ID: 0"
        echo "Security: auto"
        echo "Network: ws"
        echo "Path: /ws"
        echo "TLS: ON ✅"
        echo "Allow Insecure: ON ✅ (VERY IMPORTANT!)"
        echo "WS Host: $HOST"
        echo "SNI: $HOST"
        echo ""
        echo "========================================"

        # Keep both services alive
        echo "⏳ Keeping VPN alive for 6 hours..."
        for i in $(seq 1 360); do
          if ! kill -0 $V2RAY_PID 2>/dev/null; then
            echo "⚠️ V2Ray died! Restarting..."
            sudo v2ray run -config /usr/local/etc/v2ray/config.json > /tmp/v2ray.log 2>&1 &
            V2RAY_PID=$!
            sleep 3
          fi
          if ! kill -0 $CF_PID 2>/dev/null; then
            echo "⚠️ Cloudflared died! Restarting..."
            cloudflared tunnel --url http://localhost:8080 > /tmp/tunnel.log 2>&1 &
            CF_PID=$!
            sleep 10
          fi
          echo "[$i/360] $(date '+%H:%M:%S') - VPN Running..."
          sleep 60
        done
