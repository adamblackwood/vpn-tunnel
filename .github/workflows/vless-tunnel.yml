name: VLESS Cloudflare Tunnel with Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *" # يعمل تلقائياً كل 5 ساعات

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Cloudflared
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Download Xray Core
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip Xray-linux-64.zip -d xray
          chmod +x xray/xray

      - name: Create Xray Config (VLESS Fixed UUID)
        run: |
          cat > config.json <<EOF
          {
            "inbounds": [
              {
                "port": 8080,
                "listen": "127.0.0.1",
                "protocol": "vless",
                "settings": {
                  "clients": [
                    {
                      "id": "7dcf879a-148c-4399-b220-d68f78440e3d",
                      "level": 0
                    }
                  ],
                  "decryption": "none"
                },
                "streamSettings": {
                  "network": "ws",
                  "wsSettings": {
                    "path": "/ws"
                  }
                }
              }
            ],
            "outbounds": [
              {
                "protocol": "freedom"
              }
            ]
          }
          EOF

      - name: Start Xray Server
        run: ./xray/xray -config=config.json &

      - name: Start Cloudflare Tunnel & Extract URL
        run: |
          /usr/local/bin/cloudflared tunnel --url http://localhost:8080 --no-autoupdate > tunnel.log 2>&1 &
          sleep 10
          # استخراج الرابط من السجلات
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' tunnel.log | head -n 1)
          # إزالة كلمة https://
          HOST=$(echo $TUNNEL_URL | sed 's/https:\/\///')
          echo "HOST=$HOST" >> $GITHUB_ENV

      - name: Send Telegram Notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="🚀 *VLESS Tunnel Started!*
          
          🎯 *Server:* \`104.21.3.47\`
          🔌 *Port:* \`80\`
          🔗 *Host:* \`${{ env.HOST }}\`
          🔑 *UUID:* \`7dcf879a-148c-4399-b220-d68f78440e3d\`
          🛡 *TLS:* \`OFF\`
          🌐 *Network:* \`ws\`
          📁 *Path:* \`/ws\`
          
          ✅ *Ready for HTTP Injector!*"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="${MESSAGE}" \
          -d parse_mode="Markdown"

      - name: Keep Alive
        run: sleep 320m
