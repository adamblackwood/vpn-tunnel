طname: Shift 2 (04:00 - 10:00)

on:
  workflow_dispatch:

permissions:
  contents: write # صلاحية الكتابة لحل مشكلة 403

jobs:
  shift-2:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Install Cloudflared & Xray
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip Xray-linux-64.zip -d xray
          chmod +x xray/xray

      - name: Create Xray Config
        run: |
          cat > config.json <<EOF
          { "inbounds": [{"port": 8080,"listen": "127.0.0.1","protocol": "vless","settings": {"clients": [{"id": "7dcf879a-148c-4399-b220-d68f78440e3d","level": 0}],"decryption": "none"},"streamSettings": {"network": "ws","wsSettings": {"path": "/ws"}}}], "outbounds": [{"protocol": "freedom"}] }
          EOF

      - name: Check Duplicate & Take Shift
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git pull --rebase
          CURRENT_TIME=$(date +%s)
          ACTIVE=""
          HEARTBEAT=0
          
          if [ -f state.json ]; then
            ACTIVE=$(cat state.json | grep -o '"active_shift": "[^"]*"' | cut -d'"' -f4)
            HEARTBEAT=$(cat state.json | grep -o '"heartbeat": [0-9]*' | grep -o '[0-9]*')
          fi
          
          # إذا كانت نفس الوردية تعمل ونبضها خلال آخر دقيقتين، فهذا تشغيل مكرر
          if [ "$ACTIVE" == "shift-2" ] && [ -n "$HEARTBEAT" ] && [ $((CURRENT_TIME - HEARTBEAT)) -lt 120 ]; then
            echo "DUPLICATE=true" >> $GITHUB_ENV
            MESSAGE="⚠️ *تنبيه: تم محاولة تشغيل الوردية الثانية وهي تعمل بالفعل!*
            تم تجاهل الطلب المكرر لمنع التعارض."
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" -d text="${MESSAGE}" -d parse_mode="Markdown"
          else
            echo "DUPLICATE=false" >> $GITHUB_ENV
            echo "{\"active_shift\": \"shift-2\", \"heartbeat\": $CURRENT_TIME}" > state.json
            git add state.json
            git commit -m "Shift 2 started" || echo "No changes"
            git push
          fi

      - name: Start Servers
        if: env.DUPLICATE == 'false'
        run: |
          ./xray/xray -config=config.json &
          /usr/local/bin/cloudflared tunnel --url http://localhost:8080 --no-autoupdate > tunnel.log 2>&1 &
          sleep 10
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' tunnel.log | head -n 1)
          HOST=$(echo $TUNNEL_URL | sed 's/https:\/\///')
          echo "HOST=$HOST" >> $GITHUB_ENV

      - name: Send Telegram (Start)
        if: env.DUPLICATE == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="🔵 *الوردية الثانية بدأت!*
          🕒 من 04:00 إلى 08:00 (وقت احتياطي حتى 10:00)
          🔗 *Host:* \`${{ env.HOST }}\`"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" -d text="${MESSAGE}" -d parse_mode="Markdown"

      - name: Keep Alive, Heartbeat & Monitor Handover
        if: env.DUPLICATE == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          START_TIME=$(date +%s)
          MAX_DURATION=$((4 * 3600))
          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            
            # 1. تحديث نبضات الحياة (Heartbeat)
            echo "{\"active_shift\": \"shift-2\", \"heartbeat\": $CURRENT_TIME}" > state.json
            git add state.json
            git commit -m "Shift 2 heartbeat" || echo "No changes"
            git pull --rebase && git push || echo "Push conflict, will retry"
            
            # 2. فحص التسليم
            git pull --rebase
            ACTIVE=$(cat state.json | grep -o '"active_shift": "[^"]*"' | cut -d'"' -f4)
            
            if [ "$ACTIVE" != "shift-2" ]; then
              MESSAGE="🟡 *الوردية الثانية سلّمت الدوام للوردية الأولى وتوقفت.*
              ⏱ مدة العمل الفعلية: $((ELAPSED / 60)) دقيقة."
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" -d text="${MESSAGE}" -d parse_mode="Markdown"
              break
            fi
            
            if [ "$ELAPSED" -ge "$MAX_DURATION" ]; then
              MESSAGE="🔴 *الوردية الثانية انتهى وقتها القانوني (4 ساعات) وتتوقف الآن.*
              بانتظار الوردية الأولى..."
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d chat_id="${TELEGRAM_CHAT_ID}" -d text="${MESSAGE}" -d parse_mode="Markdown"
              break
            fi
            
            sleep 60
          done
