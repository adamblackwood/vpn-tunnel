name: VMess Tunnel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Xray
      run: |
        curl -L -o install-xray.sh https://github.com/XTLS/Xray-install/raw/main/install-release.sh
        chmod +x install-xray.sh
        sudo bash install-xray.sh
        sudo systemctl disable xray
        xray version
        echo "✅ Xray installed"

    - name: Install cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        cloudflared --version

    - name: Setup VMess Config
      run: |
        sudo mkdir -p /usr/local/etc/xray /var/log/xray
        sudo tee /usr/local/etc/xray/config.json > /dev/null << 'EOF'
        {
          "log": {
            "access": "/var/log/xray/access.log",
            "error": "/var/log/xray/error.log",
            "loglevel": "debug"
          },
          "inbounds": [{
            "port": 8080,
            "listen": "0.0.0.0",
            "protocol": "vmess",
            "settings": {
              "clients": [{
                "id": "7dcf879a-148c-4399-b220-d68f78440e3d",
                "alterId": 0
              }]
            },
            "streamSettings": {
              "network": "ws",
              "wsSettings": {
                "path": "/ws"
              }
            }
          }],
          "outbounds": [{
            "protocol": "freedom",
            "settings": {}
          }]
        }
        EOF
        echo "✅ VMess config created"

    - name: Start VMess & Cloudflare Tunnel
      run: |
        echo "🚀 Starting Xray..."
        sudo xray run -config /usr/local/etc/xray/config.json > /tmp/xray.log 2>&1 &
        XRAY_PID=$!
        sleep 5

        if ! kill -0 $XRAY_PID 2>/dev/null; then
          echo "❌ Xray failed to start!"
          cat /tmp/xray.log
          exit 1
        fi
        echo "✅ Xray running (PID: $XRAY_PID)"

        echo "🚀 Starting Cloudflare Tunnel..."
        cloudflared tunnel --url http://localhost:8080 > /tmp/tunnel.log 2>&1 &
        CF_PID=$!
        sleep 30

        if ! kill -0 $CF_PID 2>/dev/null; then
          echo "❌ Cloudflared failed to start!"
          cat /tmp/tunnel.log
          exit 1
        fi
        echo "✅ Cloudflared running (PID: $CF_PID)"

        TUNNEL_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)

        if [ -z "$TUNNEL_URL" ]; then
          echo "⚠️ Waiting more for tunnel URL..."
          sleep 20
          TUNNEL_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
        fi

        if [ -z "$TUNNEL_URL" ]; then
          echo "❌ Could not get tunnel URL!"
          cat /tmp/tunnel.log
          exit 1
        fi

        HOST=$(echo $TUNNEL_URL | sed 's|https://||')

        echo ""
        echo "========================================"
        echo "🎯 TUNNEL URL: $TUNNEL_URL"
        echo "🎯 HOST: $HOST"
        echo "========================================"

        # Send to Telegram
        BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
        CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"

        MSG_TEXT="VMess Tunnel Started!%0A%0A🎯 Server: $HOST%0A🔗 URL: $TUNNEL_URL%0A%0A📱 HTTP Injector:%0A• Type: VMess%0A• Server: $HOST%0A• Port: 443%0A• UUID: 7dcf879a-148c-4399-b220-d68f78440e3d%0A• Alter ID: 0%0A• Security: auto%0A• Network: ws%0A• Path: /ws%0A• TLS: ON%0A• SNI: $HOST%0A• WS Host: $HOST%0A%0A⏰ Auto-restart: Every 5 hours%0A⏳ Duration: 6 hours max"

        curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
          -d "chat_id=$CHAT_ID" \
          -d "parse_mode=HTML" \
          -d "text=$MSG_TEXT" \
          > /tmp/telegram_response.json

        if [ $? -eq 0 ]; then
          echo "✅ Telegram sent!"
        else
          echo "⚠️ Telegram failed"
        fi

        echo ""
        echo "========================================"
        echo "📱 SETTINGS:"
        echo "Type: VMess"
        echo "Server: $HOST"
        echo "Port: 443"
        echo "UUID: 7dcf879a-148c-4399-b220-d68f78440e3d"
        echo "Alter ID: 0"
        echo "Security: auto"
        echo "Network: ws"
        echo "Path: /ws"
        echo "TLS: ON"
        echo "SNI: $HOST"
        echo "WS Host: $HOST"
        echo "========================================"

        # Keep alive
        echo "⏳ Keeping alive for 6 hours..."
        for i in $(seq 1 360); do
          if ! kill -0 $XRAY_PID 2>/dev/null; then
            echo "⚠️ Xray died! Restarting..."
            sudo xray run -config /usr/local/etc/xray/config.json > /tmp/xray.log 2>&1 &
            XRAY_PID=$!
            sleep 3
          fi
          if ! kill -0 $CF_PID 2>/dev/null; then
            echo "⚠️ Cloudflared died! Restarting..."
            cloudflared tunnel --url http://localhost:8080 > /tmp/tunnel.log 2>&1 &
            CF_PID=$!
            sleep 15
            NEW_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
            if [ -n "$NEW_URL" ]; then
              TUNNEL_URL=$NEW_URL
              HOST=$(echo $TUNNEL_URL | sed 's|https://||')
              echo "🔄 New tunnel: $TUNNEL_URL"
            fi
          fi
          echo "[$i/360] $(date '+%H:%M:%S') | $TUNNEL_URL"
          sleep 60
        done
