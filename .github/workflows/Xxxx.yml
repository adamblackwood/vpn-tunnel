name: VLESS Tunnel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install V2Ray
      run: |
        curl -L -o install-v2ray.sh https://github.com/v2fly/fhs-install-v2ray/raw/master/install-release.sh
        chmod +x install-v2ray.sh
        sudo bash install-v2ray.sh
        sudo systemctl disable v2ray
        v2ray version
        echo "✅ V2Ray installed"

    - name: Install cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        cloudflared --version

    - name: Setup VLESS Config
      run: |
        sudo mkdir -p /usr/local/etc/v2ray /var/log/v2ray
        sudo tee /usr/local/etc/v2ray/config.json > /dev/null << 'EOF'
        {
          "log": {
            "access": "/var/log/v2ray/access.log",
            "error": "/var/log/v2ray/error.log",
            "loglevel": "debug"
          },
          "inbounds": [{
            "port": 8080,
            "listen": "0.0.0.0",
            "protocol": "vless",
            "settings": {
              "clients": [{
                "id": "7dcf879a-148c-4399-b220-d68f78440e3d",
                "flow": ""
              }],
              "decryption": "none"
            },
            "streamSettings": {
              "network": "ws",
              "wsSettings": {
                "path": "/?ed=2048",
                "headers": {
                  "Host": "ourquraan.com"
                }
              }
            }
          }],
          "outbounds": [{
            "protocol": "freedom",
            "settings": {}
          }]
        }
        EOF
        echo "✅ VLESS config created"

    - name: Start VLESS & Cloudflare Tunnel
      run: |
        echo "🚀 Starting V2Ray (VLESS)..."
        sudo v2ray run -config /usr/local/etc/v2ray/config.json > /tmp/v2ray.log 2>&1 &
        V2RAY_PID=$!
        sleep 5

        if ! kill -0 $V2RAY_PID 2>/dev/null; then
          echo "❌ V2Ray failed to start!"
          cat /tmp/v2ray.log
          exit 1
        fi
        echo "✅ V2Ray running (PID: $V2RAY_PID)"

        echo "🚀 Starting Cloudflare Tunnel..."
        cloudflared tunnel --url http://localhost:8080 > /tmp/tunnel.log 2>&1 &
        CF_PID=$!
        sleep 25

        if ! kill -0 $CF_PID 2>/dev/null; then
          echo "❌ Cloudflared failed to start!"
          cat /tmp/tunnel.log
          exit 1
        fi
        echo "✅ Cloudflared running (PID: $CF_PID)"

        TUNNEL_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)

        if [ -z "$TUNNEL_URL" ]; then
          echo "⚠️ Waiting more for tunnel URL..."
          sleep 15
          TUNNEL_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
        fi

        if [ -z "$TUNNEL_URL" ]; then
          echo "❌ Could not get tunnel URL!"
          cat /tmp/tunnel.log
          exit 1
        fi

        HOST=$(echo $TUNNEL_URL | sed 's|https://||')

        echo ""
        echo "========================================"
        echo "🎯 TUNNEL URL: $TUNNEL_URL"
        echo "🎯 HOST: $HOST"
        echo "========================================"

        # Send to Telegram
        BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
        CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"

        MSG_TEXT="VLESS Tunnel Started!%0A%0A🎯 Server: $HOST%0A🔗 URL: $TUNNEL_URL%0A%0A📱 HTTP Injector / NekoBox:%0A• Type: VLESS%0A• Server: $HOST%0A• Port: 443%0A• UUID: 7dcf879a-148c-4399-b220-d68f78440e3d%0A• Encryption: none%0A• Network: ws%0A• Path: /?ed=2048%0A• TLS: ON%0A• SNI: $HOST%0A• WS Host: ourquraan.com%0A%0A⚠️ Domain Fronting requires Custom Domain.%0AHTTP Host spoofing only.%0A%0A⏰ Auto-restart: Every 5 hours%0A⏳ Duration: 6 hours max"

        curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
          -d "chat_id=$CHAT_ID" \
          -d "parse_mode=HTML" \
          -d "text=$MSG_TEXT" \
          > /tmp/telegram_response.json

        if [ $? -eq 0 ]; then
          echo "✅ Telegram notification sent!"
        else
          echo "⚠️ Telegram failed"
          cat /tmp/telegram_response.json
        fi

        echo ""
        echo "========================================"
        echo "📱 SETTINGS FOR CLIENT:"
        echo ""
        echo "Type: VLESS"
        echo "Server: $HOST"
        echo "Port: 443"
        echo "UUID: 7dcf879a-148c-4399-b220-d68f78440e3d"
        echo "Encryption: none"
        echo "Network: ws"
        echo "Path: /?ed=2048"
        echo "TLS: ON"
        echo "SNI: $HOST"
        echo "WS Host: ourquraan.com"
        echo "========================================"

        # Keep alive for 6 hours
        echo "⏳ Keeping tunnel alive for 6 hours..."
        for i in $(seq 1 360); do
          if ! kill -0 $V2RAY_PID 2>/dev/null; then
            echo "⚠️ V2Ray died! Restarting..."
            sudo v2ray run -config /usr/local/etc/v2ray/config.json > /tmp/v2ray.log 2>&1 &
            V2RAY_PID=$!
            sleep 3
          fi
          if ! kill -0 $CF_PID 2>/dev/null; then
            echo "⚠️ Cloudflared died! Restarting..."
            cloudflared tunnel --url http://localhost:8080 > /tmp/tunnel.log 2>&1 &
            CF_PID=$!
            sleep 15
            NEW_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
            if [ -n "$NEW_URL" ]; then
              TUNNEL_URL=$NEW_URL
              HOST=$(echo $TUNNEL_URL | sed 's|https://||')
              echo "🔄 New tunnel: $TUNNEL_URL"
            fi
          fi
          echo "[$i/360] $(date '+%H:%M:%S') | Tunnel: $TUNNEL_URL"
          sleep 60
        done
